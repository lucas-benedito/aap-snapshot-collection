---
- name: Set component config
  ansible.builtin.set_fact:
    _operations_current_component: "{{ _operations_component_config[component_name] }}"

- name: Set DB credentials from pre-discovered store
  ansible.builtin.set_fact:
    _operations_db_host: "{{ _artifact_db_credentials[component_name].host }}"
    _operations_db_port: "{{ _artifact_db_credentials[component_name].port }}"
    _operations_db_user: "{{ _artifact_db_credentials[component_name].user }}"
    _operations_db_password: "{{ _artifact_db_credentials[component_name].password }}"
    _operations_db_admin_password: "{{ _artifact_db_credentials[component_name].admin_password }}"
  no_log: "{{ __operations_no_log }}"

- name: Discover PostgreSQL container image
  containers.podman.podman_container_info:
    name: postgresql
  register: _operations_pg_container_info
  delegate_to: "{{ groups['database'][0] | default(inventory_hostname) }}"

- name: Set PostgreSQL image fact
  ansible.builtin.set_fact:
    _operations_pg_image: "{{ _operations_pg_container_info.containers[0].ImageName }}"

- name: Restore database via temp container
  block:
    - name: Create temp restore container
      containers.podman.podman_container:
        name: aap-snapshot-restore
        image: "{{ _operations_pg_image }}"
        state: started
        command: sleep infinity
        network: host
        volume:
          - "{{ _operations_staged_restore_dir }}:/tmp/migration:z"

    - name: "Grant CREATEDB to {{ _operations_db_user }}"
      containers.podman.podman_container_exec:
        name: aap-snapshot-restore
        command: >-
          psql -h {{ _operations_db_host }}
          -p {{ _operations_db_port }}
          -U {{ postgresql_restore_admin_user }}
          -c "ALTER USER {{ _operations_db_user }} WITH CREATEDB;"
        env:
          PGPASSWORD: "{{ _operations_db_admin_password }}"
      no_log: "{{ __operations_no_log }}"
      register: _operations_grant_result
      failed_when: _operations_grant_result.rc != 0

    - name: "Restore {{ component_name }} database"
      containers.podman.podman_container_exec:
        name: aap-snapshot-restore
        command: >-
          pg_restore --clean --if-exists --no-owner
          -h {{ _operations_db_host }}
          -p {{ _operations_db_port }}
          -U {{ _operations_db_user }}
          -d {{ component_name }}
          /tmp/migration/{{ component_name }}/{{ component_name }}.pgc
        env:
          PGPASSWORD: "{{ _operations_db_password }}"
      no_log: "{{ __operations_no_log }}"
      register: _operations_restore_result
      failed_when: >-
        _operations_restore_result.rc != 0
        and 'FATAL' in (_operations_restore_result.stderr | default(''))

  always:
    - name: "Revoke CREATEDB from {{ _operations_db_user }}"
      containers.podman.podman_container_exec:
        name: aap-snapshot-restore
        command: >-
          psql -h {{ _operations_db_host }}
          -p {{ _operations_db_port }}
          -U {{ postgresql_restore_admin_user }}
          -c "ALTER USER {{ _operations_db_user }} NOCREATEDB;"
        env:
          PGPASSWORD: "{{ _operations_db_admin_password }}"
      no_log: "{{ __operations_no_log }}"
      failed_when: _operations_revoke_result.rc != 0
      register: _operations_revoke_result
      when: _operations_grant_result is defined and _operations_grant_result.rc == 0

    - name: Remove temp restore container
      containers.podman.podman_container:
        name: aap-snapshot-restore
        state: absent

    - name: Clean up staged artifact files
      ansible.builtin.file:
        path: "{{ _operations_staged_restore_dir }}/{{ component_name }}"
        state: absent
