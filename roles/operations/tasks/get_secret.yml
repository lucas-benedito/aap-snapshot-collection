---
- name: Set component config
  ansible.builtin.set_fact:
    _operations_current_component: "{{ _operations_component_config[component_name] }}"

# --- RPM platform ---
- name: "Gather secret key (RPM)"
  when: aap_platform == 'rpm'
  block:
    - name: "Get component secrets"
      ansible.aap_snapshot.aap_component_info:
        component: "{{ component_name }}"
        gather: [secrets]
      register: _operations_component_secrets_info
      become: true
      become_user: "{{ _operations_current_component.django_user }}"
      no_log: "{{ __operations_no_log }}"

    # Simple components: build payload from secret_keys
    - name: "Set secret fact (simple)"
      ansible.builtin.set_fact:
        "{{ component_name }}_secrets_payload": >-
          {% set payload = {} %}
          {% for key in _operations_current_component.secret_keys %}
          {%   set _ = payload.update({key: _operations_component_secrets_info.secrets[key] | b64encode}) %}
          {% endfor %}
          {{ payload }}
      no_log: "{{ __operations_no_log }}"
      when:
        - _operations_current_component.multi_resource_keys | length == 0

    # Gateway with multi_resource_keys: include optional resource keys
    - name: "Set secret fact (with resource keys)"
      ansible.builtin.set_fact:
        "{{ component_name }}_secrets_payload": >-
          {% set payload = {} %}
          {% for key in _operations_current_component.secret_keys %}
          {%   set _ = payload.update({key: _operations_component_secrets_info.secrets[key] | b64encode}) %}
          {% endfor %}
          {% for res in _operations_current_component.multi_resource_keys %}
          {%   set rkey = res + '_resource_key' %}
          {%   if _operations_component_secrets_info.secrets[rkey] is defined %}
          {%     set _ = payload.update({rkey: _operations_component_secrets_info.secrets[rkey] | b64encode}) %}
          {%   endif %}
          {% endfor %}
          {{ payload }}
      no_log: "{{ __operations_no_log }}"
      when:
        - _operations_current_component.multi_resource_keys | length > 0

# --- Containerized platform ---
- name: "Gather podman secrets"
  when: aap_platform == 'containerized'
  block:
    - name: Get all podman secrets
      containers.podman.podman_secret_info:
      register: _operations_secrets

    - name: "Gather container image"
      containers.podman.podman_container_info:
        name: "{{ _operations_current_component.container_name }}"
      register: _operations_container_info

    # Standard single podman secret (controller, eda, gateway)
    - name: "Get existing secret_key secret"
      containers.podman.podman_container:
        name: "{{ component_name }}-websocket-secret"
        image: '{{ _operations_container_info.containers[0].ImageName }}'
        command: "cat /run/secrets/{{ _operations_current_component.podman_secret_name }}"
        detach: false
        rm: true
        secrets: ['{{ _operations_current_component.podman_secret_name }}']
      register: _operations_component_secret_key
      no_log: "{{ __operations_no_log }}"
      run_once: true
      changed_when: false
      when:
        - _operations_current_component.podman_secret_name is not none
        - _operations_secrets.secrets | map(attribute='Spec') | selectattr('Name', 'equalto', _operations_current_component.podman_secret_name) | length > 0

    # Resource server secret (controller, eda - not gateway, not hub)
    - name: "Get existing resource_server secret"
      containers.podman.podman_container:
        name: "{{ component_name }}-resource-key-secret"
        image: '{{ _operations_container_info.containers[0].ImageName }}'
        command: "cat /run/secrets/{{ component_name }}_resource_server"
        detach: false
        rm: true
        secrets: ['{{ component_name }}_resource_server']
      register: _operations_component_resource_key
      no_log: "{{ __operations_no_log }}"
      run_once: true
      changed_when: false
      when:
        - _operations_current_component.multi_resource_keys | length == 0
        - not (_operations_current_component.podman_secrets is defined and _operations_current_component.podman_secrets | length > 0)
        - _operations_current_component.podman_secret_name is not none
        - _operations_secrets.secrets | map(attribute='Spec') | selectattr('Name', 'equalto', component_name + '_resource_server') | length > 0

    # Hub multiple podman secrets (hub_secret_key, hub_database_fields)
    - name: "Get podman secrets"
      containers.podman.podman_container:
        name: "{{ component_name }}-{{ item.name }}-secret"
        image: '{{ _operations_container_info.containers[0].ImageName }}'
        command: "cat /run/secrets/{{ item.name }}"
        detach: false
        rm: true
        secrets: ['{{ item.name }}']
      register: _operations_podman_secret_results
      no_log: "{{ __operations_no_log }}"
      run_once: true
      changed_when: false
      loop: "{{ _operations_current_component.podman_secrets | default([]) }}"
      when:
        - _operations_current_component.podman_secrets is defined
        - _operations_current_component.podman_secrets | length > 0
        - _operations_secrets.secrets | map(attribute='Spec') | selectattr('Name', 'equalto', item.name) | length > 0

    # Hub resource server secret
    - name: "Get existing resource_server secret (hub)"
      containers.podman.podman_container:
        name: "{{ component_name }}-resource-key-secret"
        image: '{{ _operations_container_info.containers[0].ImageName }}'
        command: "cat /run/secrets/{{ component_name }}_resource_server"
        detach: false
        rm: true
        secrets: ['{{ component_name }}_resource_server']
      register: _operations_hub_resource_key
      no_log: "{{ __operations_no_log }}"
      run_once: true
      changed_when: false
      when:
        - _operations_current_component.podman_secrets is defined
        - _operations_current_component.podman_secrets | length > 0
        - _operations_secrets.secrets | map(attribute='Spec') | selectattr('Name', 'equalto', component_name + '_resource_server') | length > 0

    # Set payload for standard components (single secret + resource key)
    - name: "Set secret fact (standard)"
      ansible.builtin.set_fact:
        "{{ component_name }}_secrets_payload": >-
          {% set payload = {} %}
          {% set _ = payload.update({_operations_current_component.secret_keys[0]: _operations_component_secret_key.stdout | b64encode}) %}
          {% set _ = payload.update({component_name + '_resource_key': _operations_component_resource_key.stdout | b64encode}) %}
          {{ payload }}
      no_log: "{{ __operations_no_log }}"
      when:
        - _operations_current_component.podman_secret_name is not none
        - _operations_current_component.multi_resource_keys | length == 0
        - not (_operations_current_component.podman_secrets is defined and _operations_current_component.podman_secrets | length > 0)

    # Set payload for gateway (single secret, no resource key)
    - name: "Set secret fact (gateway)"
      ansible.builtin.set_fact:
        "{{ component_name }}_secrets_payload": >-
          {% set payload = {} %}
          {% set _ = payload.update({_operations_current_component.secret_keys[0]: _operations_component_secret_key.stdout | b64encode}) %}
          {{ payload }}
      no_log: "{{ __operations_no_log }}"
      when:
        - _operations_current_component.podman_secret_name is not none
        - _operations_current_component.multi_resource_keys | length > 0

    # Set payload for hub (multiple podman secrets + resource key)
    - name: "Set secret fact (multi-secret)"
      ansible.builtin.set_fact:
        "{{ component_name }}_secrets_payload": >-
          {% set payload = {} %}
          {% for res in _operations_podman_secret_results.results | default([]) %}
          {%   if res.stdout is defined %}
          {%     set _ = payload.update({res.item.artifact_key: res.stdout | b64encode}) %}
          {%   endif %}
          {% endfor %}
          {% if _operations_hub_resource_key.stdout is defined %}
          {%   set _ = payload.update({component_name + '_resource_key': _operations_hub_resource_key.stdout | b64encode}) %}
          {% endif %}
          {{ payload }}
      no_log: "{{ __operations_no_log }}"
      when:
        - _operations_current_component.podman_secrets is defined
        - _operations_current_component.podman_secrets | length > 0

# --- OCP platform ---
- name: "Gather secret key (OCP)"
  when: aap_platform == 'operator'
  block:
    - name: "Read secret from K8s"
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: "{{ operations_ocp_namespace }}"
        name: "{{ _operations_current_component.k8s_secret_name }}"
      register: _operations_comp_k8s_secret
      no_log: "{{ __operations_no_log }}"

    # Simple secret (single field)
    - name: "Set secret fact"
      ansible.builtin.set_fact:
        "{{ component_name }}_secrets_payload":
          "{{ _operations_current_component.secret_keys[0] }}": "{{ _operations_comp_k8s_secret.resources[0].data[_operations_current_component.k8s_secret_field] | default('') }}"
      no_log: "{{ __operations_no_log }}"
      when:
        - _operations_current_component.ocp_extra_secrets | length == 0
        - _operations_comp_k8s_secret.resources | length > 0

    # Hub: extra secrets from additional K8s secrets
    - name: "Read extra secrets from K8s"
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: "{{ operations_ocp_namespace }}"
        name: "{{ item.secret_name }}"
      register: _operations_comp_extra_k8s_secrets
      no_log: "{{ __operations_no_log }}"
      loop: "{{ _operations_current_component.ocp_extra_secrets }}"
      when: _operations_current_component.ocp_extra_secrets | length > 0

    - name: "Set secret fact (with extra secrets)"
      ansible.builtin.set_fact:
        "{{ component_name }}_secrets_payload": >-
          {% set payload = {_operations_current_component.secret_keys[0]: _operations_comp_k8s_secret.resources[0].data[_operations_current_component.k8s_secret_field] | default('')} %}
          {% for extra in _operations_comp_extra_k8s_secrets.results | default([]) %}
          {%   if extra.resources | default([]) | length > 0 %}
          {%     set _ = payload.update({extra.item.artifact_key: extra.resources[0].data[extra.item.field] | default('')}) %}
          {%   endif %}
          {% endfor %}
          {{ payload }}
      no_log: "{{ __operations_no_log }}"
      when:
        - _operations_current_component.ocp_extra_secrets | length > 0
        - _operations_comp_k8s_secret.resources | length > 0

# --- Merge into _operations_component_secrets ---
- name: "Update secrets fact"
  ansible.builtin.set_fact:
    _operations_component_secrets: "{{ hostvars['localhost']['_operations_component_secrets'] | default({}) | combine(vars[component_name + '_secrets_payload'] | from_yaml) }}"
  delegate_to: localhost
  delegate_facts: true
  no_log: "{{ __operations_no_log }}"
  when: vars[component_name + '_secrets_payload'] is defined
