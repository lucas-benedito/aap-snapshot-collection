---
__postgresql_no_log: "{{ not (disable_no_log | default(false) | bool) }}"

# OCP namespace (read from user-facing var, independent of ocp_utils)
postgresql_ocp_namespace: "{{ ocp_namespace | default('aap') }}"

# Auth variables
postgresql_django_manage_get_cmd: "from django.conf import settings; print(settings.DATABASES)"

# Export directory variables
postgresql_export_dir: "/tmp/backups/automation-platform"
postgresql_export_dest: "{{ lookup('env', 'PWD') }}/db_export"
postgresql_export_extension: "pgc"

# Import variables
postgresql_restore_admin_user: "postgres"
postgresql_restore_timeout: 3600
...
