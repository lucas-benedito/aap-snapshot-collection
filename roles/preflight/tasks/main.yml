---
- name: Check platform configuration
  ansible.builtin.include_tasks: check_platform.yml

- name: Check import variable requirements
  ansible.builtin.include_tasks: check_import_vars.yml
  when:
    - _snapshot_operation | default('') == 'import'
    - inventory_hostname == 'localhost'

- name: Check temp PVC size is sufficient for artifact
  ansible.builtin.include_tasks: check_temp_pvc_size.yml
  when:
    - _snapshot_operation | default('') == 'import'
    - aap_platform == 'operator'
    - inventory_hostname == 'localhost'

- name: Check OCP target requirements
  ansible.builtin.include_tasks: check_ocp_target.yml
  when: aap_platform == 'operator'

- name: Check AAP CR health
  ansible.builtin.include_tasks: check_aap_cr.yml
  when: aap_platform == 'operator'

- name: Check component services
  ansible.builtin.include_tasks: check_services.yml

- name: Check database connectivity
  ansible.builtin.include_tasks: check_databases.yml

- name: Check gateway status API
  ansible.builtin.include_tasks: check_gateway_status.yml

- name: Pre-flight Automation Controller
  ansible.builtin.include_role:
    name: ansible.aap_snapshot.automationcontroller
    tasks_from: preflight.yml
  when:
    - groups.get('controller_groups', []) | length > 0
    - inventory_hostname in groups.get('controller_groups', [])

- name: Pre-flight Automation EDA
  ansible.builtin.include_role:
    name: ansible.aap_snapshot.automationeda
    tasks_from: preflight.yml
  when:
    - groups.get('eda_groups', []) | length > 0
    - inventory_hostname in groups.get('eda_groups', [])

- name: Pre-flight Automation Gateway
  ansible.builtin.include_role:
    name: ansible.aap_snapshot.automationgateway
    tasks_from: preflight.yml
  when:
    - groups.get('gateway_groups', []) | length > 0
    - inventory_hostname in groups.get('gateway_groups', [])

- name: Pre-flight Automation Hub
  ansible.builtin.include_role:
    name: ansible.aap_snapshot.automationhub
    tasks_from: preflight.yml
  when:
    - groups.get('hub_groups', []) | length > 0
    - inventory_hostname in groups.get('hub_groups', [])
