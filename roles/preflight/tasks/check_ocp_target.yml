---
# Validate OCP target: namespace exists and AAP operator is installed.
# Runs before any CR or secret operations to fail early with clear messages.

- name: Check target namespace exists
  kubernetes.core.k8s_info:
    kind: Namespace
    name: "{{ preflight_ocp_namespace }}"
  register: _preflight_ns_check

- name: Fail if target namespace does not exist
  ansible.builtin.fail:
    msg: >-
      Target namespace '{{ preflight_ocp_namespace }}' does not exist on the cluster.
      Create it before running the import:
        oc create namespace {{ preflight_ocp_namespace }}
  when: _preflight_ns_check.resources | length == 0

- name: Check if AAP operator CRD is available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: "ansibleautomationplatforms.aap.ansible.com"
  register: _preflight_crd_check

- name: Fail if AAP operator is not installed
  ansible.builtin.fail:
    msg: >-
      The AnsibleAutomationPlatform CRD was not found on the cluster.
      The AAP operator must be installed before running the import.
      Install it via OperatorHub or apply the operator subscription manually.
  when: _preflight_crd_check.resources | length == 0
