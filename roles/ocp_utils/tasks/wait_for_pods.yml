---
- name: Wait for gateway pod to be running
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ ocp_utils_ocp_namespace }}"
    label_selectors:
      - "app.kubernetes.io/component=aap-gateway"
    field_selectors:
      - status.phase=Running
  register: _ocp_utils_gw_pods
  until: _ocp_utils_gw_pods.resources | length > 0
  retries: 60
  delay: 10

- name: Wait for controller pod to be running
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ ocp_utils_ocp_namespace }}"
    label_selectors:
      - "app.kubernetes.io/component=automationcontroller"
    field_selectors:
      - status.phase=Running
  register: _ocp_utils_ctrl_pods
  until: _ocp_utils_ctrl_pods.resources | length > 0
  retries: 60
  delay: 10

- name: Wait for hub API pod to be running
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ ocp_utils_ocp_namespace }}"
    label_selectors:
      - "app.kubernetes.io/name=automationhub-api"
    field_selectors:
      - status.phase=Running
  register: _ocp_utils_hub_pods
  until: _ocp_utils_hub_pods.resources | length > 0
  retries: 60
  delay: 10

- name: Wait for EDA API pod to be running
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ ocp_utils_ocp_namespace }}"
    label_selectors:
      - "app.kubernetes.io/component=eda-api"
    field_selectors:
      - status.phase=Running
  register: _ocp_utils_eda_pods
  until: _ocp_utils_eda_pods.resources | length > 0
  retries: 60
  delay: 10

- name: Verify gateway database is reachable
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp_utils_ocp_namespace }}"
    pod: "{{ _ocp_utils_gw_pods.resources[0].metadata.name }}"
    container: "api"
    command: aap-gateway-manage check --database default
  changed_when: false
  register: _ocp_utils_gw_check
  until: _ocp_utils_gw_check.rc == 0
  retries: 30
  delay: 10

- name: Wait for gateway pod readiness
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ ocp_utils_ocp_namespace }}"
    name: "{{ _ocp_utils_gw_pods.resources[0].metadata.name }}"
  register: _ocp_utils_gw_ready
  until: >-
    _ocp_utils_gw_ready.resources | length > 0
    and (_ocp_utils_gw_ready.resources[0].status.conditions
         | default([])
         | selectattr('type', 'equalto', 'Ready')
         | selectattr('status', 'equalto', 'True')
         | list | length > 0)
  retries: 30
  delay: 10
  when: not (ocp_idle_aap | default(false) | bool)
