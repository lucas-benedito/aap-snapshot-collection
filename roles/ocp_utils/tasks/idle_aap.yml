---
- name: "Set idle_aap on AAP CR"
  kubernetes.core.k8s:
    api_version: "{{ ocp_utils_aap_cr_api_version }}"
    kind: "{{ ocp_utils_aap_cr_kind }}"
    name: "{{ ocp_utils_aap_instance_name }}"
    namespace: "{{ ocp_utils_ocp_namespace }}"
    state: patched
    merge_type: merge
    definition:
      spec:
        idle_aap: "{{ ocp_idle_aap | bool }}"
        database:
          idle_disabled: "{{ ocp_idle_aap | bool }}"

- name: Wait for AAP to idle
  when: ocp_idle_aap | bool
  block:
    - name: Wait for component deployments to scale to zero
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ ocp_utils_ocp_namespace }}"
        label_selectors:
          - "app.kubernetes.io/part-of"
      register: _ocp_utils_idle_deployments
      until: >-
        _ocp_utils_idle_deployments.resources
        | rejectattr('metadata.name', 'match', '.*operator.*')
        | selectattr('spec.replicas', 'greaterthan', 0)
        | list | length == 0
      retries: "{{ ocp_utils_idle_wait_retries }}"
      delay: "{{ ocp_utils_idle_wait_delay }}"


- name: Cascade idle_deployment to child CRs
  when: not (ocp_idle_aap | bool)
  block:
    - name: Discover child component CRs
      kubernetes.core.k8s_info:
        kind: "{{ item.kind }}"
        api_version: "{{ item.api_version }}"
        namespace: "{{ ocp_utils_ocp_namespace }}"
      register: _ocp_utils_child_crs
      loop:
        - kind: AutomationController
          api_version: automationcontroller.ansible.com/v1beta1
        - kind: AutomationHub
          api_version: automationhub.ansible.com/v1beta1
        - kind: EDA
          api_version: eda.ansible.com/v1alpha1
      loop_control:
        label: "{{ item.kind }}"

    - name: Set idle_deployment to false on child CRs
      kubernetes.core.k8s:
        api_version: "{{ item.item.api_version }}"
        kind: "{{ item.item.kind }}"
        name: "{{ cr.metadata.name }}"
        namespace: "{{ ocp_utils_ocp_namespace }}"
        state: patched
        merge_type: merge
        definition:
          spec:
            idle_deployment: false
      loop: "{{ _ocp_utils_child_crs.results }}"
      loop_control:
        label: "{{ item.item.kind }}"
      vars:
        cr: "{{ item.resources[0] }}"
      when: item.resources | length > 0

- name: Wait for AAP pods to start
  when: not (ocp_idle_aap | bool)
  block:
    - name: Wait for gateway pod to be running
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ ocp_utils_ocp_namespace }}"
        label_selectors:
          - "app.kubernetes.io/component=aap-gateway"
      register: _ocp_utils_gateway_pods
      until: >-
        _ocp_utils_gateway_pods.resources | length > 0
        and (_ocp_utils_gateway_pods.resources | map(attribute='status.phase') | select('equalto', 'Running') | list | length > 0)
      retries: "{{ ocp_utils_idle_wait_retries }}"
      delay: "{{ ocp_utils_idle_wait_delay }}"
...
