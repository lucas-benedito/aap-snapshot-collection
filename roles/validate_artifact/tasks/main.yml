---
- name: Validate migration artifact
  ansible.aap_snapshot.validate_migration_artifact:
    artifact_dir: "{{ validate_artifact_dir }}"
    supported_schema_versions: "{{ validate_artifact_supported_schema_versions }}"
    target_aap_version: "{{ validate_target_aap_version | default(omit) }}"
  register: _validate_artifact_result

- name: Print validation report
  ansible.builtin.debug:
    msg: "{{ _validate_artifact_result.report }}"
...
