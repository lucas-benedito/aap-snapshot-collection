---
- name: Load component config
  ansible.builtin.include_role:
    name: ansible.aap_snapshot.operations
    tasks_from: set_config.yml
  vars:
    component_name: "{{ automationhub_component_name }}"

- name: Re-discover hub pod
  ansible.builtin.include_role:
    name: ansible.aap_snapshot.ocp_utils
    tasks_from: discover_pod.yml
  vars:
    component_name: "{{ automationhub_component_name }}"
    _discover_label: "hub API"
    _discover_selectors:
      - "app.kubernetes.io/name=automationhub-api"
    _discover_pod_fact: "_ocp_utils_hub_pod_name"
    _discover_container_fact: "_ocp_utils_hub_container_name"
    _discover_container_name: "api"
  when: aap_platform == 'operator'

- name: Set gateway API URL (OCP)
  ansible.builtin.set_fact:
    _automationhub_gw_api_url: "http://{{ aap_instance_name | default('aap') }}.{{ automationhub_ocp_namespace }}.svc.cluster.local"
  when: aap_platform == 'operator'

- name: Set gateway credentials (containerized)
  ansible.builtin.set_fact:
    _automationhub_gw_api_url: "https://{{ ocp_utils_gateway_hostname | default('') }}"
    _automationhub_gw_admin_pw: "{{ ocp_utils_gateway_admin_password | default('') }}"
  no_log: "{{ not (disable_no_log | default(false) | bool) }}"
  when: aap_platform != 'operator'

- name: Wait for AutomationHub API to be ready
  kubernetes.core.k8s_info:
    kind: AutomationHub
    api_version: automationhub.ansible.com/v1beta1
    namespace: "{{ automationhub_ocp_namespace }}"
    name: "{{ _hub_cr_name }}"
  register: _automationhub_cr_status
  until: >-
    _automationhub_cr_status.resources | length > 0
    and (_automationhub_cr_status.resources[0].status.conditions | default([])
         | selectattr('type', 'equalto', 'Automationhub-API-Ready')
         | selectattr('status', 'equalto', 'True')
         | list | length > 0)
  retries: 60
  delay: 15
  when:
    - aap_platform == 'operator'
    - _hub_cr_name is defined

- name: Wait for hub API to be routable through gateway
  kubernetes.core.k8s_exec:
    namespace: "{{ automationhub_ocp_namespace }}"
    pod: "{{ _ocp_utils_gateway_pod_name }}"
    container: proxy
    command: >-
      curl -sf -o /dev/null
      http://localhost:8000/api/galaxy/pulp/api/v3/status/
  register: _automationhub_envoy_check
  changed_when: false
  until: _automationhub_envoy_check.rc == 0
  retries: 5
  delay: 30
  when:
    - aap_platform == 'operator'
    - _ocp_utils_gateway_pod_name is defined

- name: Read gateway operator OAuth2 token secret (OCP)
  kubernetes.core.k8s_info:
    kind: Secret
    namespace: "{{ automationhub_ocp_namespace }}"
    name: "{{ aap_instance_name | default('aap') }}-gateway-oauth2-token-secret"
  register: _automationhub_gw_oauth2_secret
  no_log: "{{ not (disable_no_log | default(false) | bool) }}"
  when: aap_platform == 'operator'

- name: Set operator OAuth2 token (OCP)
  ansible.builtin.set_fact:
    _automationhub_operator_token: "{{ _automationhub_gw_oauth2_secret.resources[0].data.token | b64decode }}"
  no_log: "{{ not (disable_no_log | default(false) | bool) }}"
  when:
    - aap_platform == 'operator'
    - _automationhub_gw_oauth2_secret.resources | default([]) | length > 0

- name: Run Pulp content repair
  block:
    - name: Trigger Pulp repair via API (OCP)
      ansible.builtin.uri:
        url: "https://{{ ocp_utils_gateway_hostname }}/api/galaxy/pulp/api/v3/repair/"
        method: POST
        body_format: json
        body:
          verify_checksums: true
        headers:
          Authorization: "Bearer {{ _automationhub_operator_token }}"
        validate_certs: "{{ operations_validate_certs | default(false) }}"
        status_code: [200, 202]
      register: _automationhub_repair_ocp
      no_log: "{{ not (disable_no_log | default(false) | bool) }}"
      retries: 6
      delay: 10
      until: _automationhub_repair_ocp is not failed
      when:
        - aap_platform == 'operator'
        - _automationhub_operator_token is defined

    - name: Trigger Pulp repair via API
      ansible.builtin.uri:
        url: "https://{{ ocp_utils_gateway_hostname }}/api/galaxy/pulp/api/v3/repair/"
        method: POST
        body_format: json
        body:
          verify_checksums: true
        url_username: "{{ automationhub_gateway_admin_user }}"
        url_password: "{{ _automationhub_gw_admin_pw }}"
        force_basic_auth: true
        validate_certs: "{{ operations_validate_certs | default(false) }}"
        status_code: [200, 202]
      register: _automationhub_repair_containerized
      no_log: "{{ not (disable_no_log | default(false) | bool) }}"
      retries: 6
      delay: 10
      until: _automationhub_repair_containerized is not failed
      when: aap_platform != 'operator'

    - name: Report Pulp repair status
      ansible.builtin.debug:
        msg: >-
          Pulp repair initiated - status
          {{ _automationhub_repair_ocp.status
             if not (_automationhub_repair_ocp.skipped | default(false))
             else _automationhub_repair_containerized.status | default('unknown') }}

  rescue:
    - name: Fallback - run Pulp repair via curl from hub pod
      kubernetes.core.k8s_exec:
        namespace: "{{ automationhub_ocp_namespace }}"
        pod: "{{ _ocp_utils_hub_pod_name }}"
        container: "{{ _ocp_utils_hub_container_name }}"
        command: >-
          curl -sf -X POST
          -H 'Content-Type: application/json'
          -H {{ ('Authorization: Bearer ' ~ _automationhub_operator_token) | quote }}
          -d '{"verify_checksums": true}'
          {{ _automationhub_gw_api_url }}/api/galaxy/pulp/api/v3/repair/
      register: _automationhub_repair_curl
      failed_when: false
      changed_when: false
      no_log: "{{ not (disable_no_log | default(false) | bool) }}"
      when:
        - aap_platform == 'operator'
        - _ocp_utils_hub_pod_name is defined
        - _automationhub_operator_token is defined

    - name: Report Pulp repair fallback status
      ansible.builtin.debug:
        msg: >-
          {{ 'Pulp repair initiated via fallback (curl from hub pod)'
             if (_automationhub_repair_curl.rc | default(1)) == 0
             else 'WARNING: Pulp content repair failed. Run manually:
             POST ' ~ _automationhub_gw_api_url ~ '/api/galaxy/pulp/api/v3/repair/' }}

- name: Reset hub admin password to match K8s secret
  ansible.builtin.include_role:
    name: ansible.aap_snapshot.operations
    tasks_from: reset_admin_password.yml
  vars:
    component_name: "{{ automationhub_component_name }}"
    _reset_pod_name: "{{ _ocp_utils_hub_pod_name | default('') }}"
    _reset_container_name: "{{ _ocp_utils_hub_container_name | default(_operations_current_component.container_name) }}"
  when: aap_platform == 'operator'
...
