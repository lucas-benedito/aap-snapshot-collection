---
- name: Get DB credentials for eda
  ansible.builtin.include_role:
    name: ansible.aap_snapshot.operations
    tasks_from: get_db_credentials.yml
  vars:
    component_name: "{{ automationeda_component_name }}"
  when: _artifact_db_credentials is not defined or 'eda' not in _artifact_db_credentials

- name: Restore database for eda
  ansible.builtin.include_role:
    name: ansible.aap_snapshot.operations
    tasks_from: db_import.yml
  vars:
    component_name: "{{ automationeda_component_name }}"

- name: Update secrets for eda
  ansible.builtin.include_role:
    name: ansible.aap_snapshot.operations
    tasks_from: update_secret.yml
  vars:
    component_name: "{{ automationeda_component_name }}"
