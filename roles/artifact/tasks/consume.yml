---
- name: Consume artifact (containerized)
  when: aap_platform == 'containerized'
  block:
    # --- Discover DB credentials (before stopping services) ---
    # Credentials must be gathered while component containers are running.
    # Each call overwrites _operations_db_* facts, so we save per-component.
    - name: Initialize DB credentials store
      ansible.builtin.set_fact:
        _artifact_db_credentials: {}

    - name: Get controller DB credentials
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.operations
        tasks_from: get_db_credentials.yml
      vars:
        component_name: "{{ automationcontroller_component_name }}"
      when:
        - groups.get('controller_groups', []) | length > 0
        - inventory_hostname == groups['controller_groups'][0]

    - name: Save controller DB credentials
      ansible.builtin.set_fact:
        _artifact_db_credentials: >-
          {{ _artifact_db_credentials | combine({
            'controller': {
              'host': _operations_db_host,
              'port': _operations_db_port,
              'user': _operations_db_user,
              'password': _operations_db_password,
              'admin_password': _operations_db_admin_password
            }
          }) }}
      no_log: true
      when:
        - groups.get('controller_groups', []) | length > 0
        - inventory_hostname == groups['controller_groups'][0]

    - name: Get hub DB credentials
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.operations
        tasks_from: get_db_credentials.yml
      vars:
        component_name: "{{ automationhub_component_name }}"
      when:
        - groups.get('hub_groups', []) | length > 0
        - inventory_hostname == groups['hub_groups'][0]

    - name: Save hub DB credentials
      ansible.builtin.set_fact:
        _artifact_db_credentials: >-
          {{ _artifact_db_credentials | combine({
            'hub': {
              'host': _operations_db_host,
              'port': _operations_db_port,
              'user': _operations_db_user,
              'password': _operations_db_password,
              'admin_password': _operations_db_admin_password
            }
          }) }}
      no_log: true
      when:
        - groups.get('hub_groups', []) | length > 0
        - inventory_hostname == groups['hub_groups'][0]

    - name: Get gateway DB credentials
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.operations
        tasks_from: get_db_credentials.yml
      vars:
        component_name: "{{ automationgateway_component_name }}"
      when:
        - groups.get('gateway_groups', []) | length > 0
        - inventory_hostname == groups['gateway_groups'][0]

    - name: Save gateway DB credentials
      ansible.builtin.set_fact:
        _artifact_db_credentials: >-
          {{ _artifact_db_credentials | combine({
            'gateway': {
              'host': _operations_db_host,
              'port': _operations_db_port,
              'user': _operations_db_user,
              'password': _operations_db_password,
              'admin_password': _operations_db_admin_password
            }
          }) }}
      no_log: true
      when:
        - groups.get('gateway_groups', []) | length > 0
        - inventory_hostname == groups['gateway_groups'][0]

    - name: Get EDA DB credentials
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.operations
        tasks_from: get_db_credentials.yml
      vars:
        component_name: "{{ automationeda_component_name }}"
      when:
        - groups.get('eda_groups', []) | length > 0
        - inventory_hostname == groups['eda_groups'][0]

    - name: Save EDA DB credentials
      ansible.builtin.set_fact:
        _artifact_db_credentials: >-
          {{ _artifact_db_credentials | combine({
            'eda': {
              'host': _operations_db_host,
              'port': _operations_db_port,
              'user': _operations_db_user,
              'password': _operations_db_password,
              'admin_password': _operations_db_admin_password
            }
          }) }}
      no_log: true
      when:
        - groups.get('eda_groups', []) | length > 0
        - inventory_hostname == groups['eda_groups'][0]

    # --- Stop services ---
    - name: Stop monitoring
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.pcp
        tasks_from: stop_service.yml
      when: inventory_hostname in (groups.get('controller_groups', [])
              + groups.get('eda_groups', [])
              + groups.get('gateway_groups', [])
              + groups.get('hub_groups', []))

    - name: Stop EDA
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationeda
        tasks_from: stop_service.yml
      when:
        - groups.get('eda_groups', []) | length > 0
        - inventory_hostname in groups.get('eda_groups', [])

    - name: Stop hub
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationhub
        tasks_from: stop_service.yml
      when:
        - groups.get('hub_groups', []) | length > 0
        - inventory_hostname in groups.get('hub_groups', [])

    - name: Stop controller
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationcontroller
        tasks_from: stop_service.yml
      when:
        - groups.get('controller_groups', []) | length > 0
        - inventory_hostname in groups.get('controller_groups', [])

    - name: Stop gateway
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationgateway
        tasks_from: stop_service.yml
      when:
        - groups.get('gateway_groups', []) | length > 0
        - inventory_hostname in groups.get('gateway_groups', [])

    # --- Stage artifact files to component hosts ---
    - name: Stage controller artifact
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.operations
        tasks_from: stage_artifact.yml
      vars:
        component_name: "{{ automationcontroller_component_name }}"
      when:
        - groups.get('controller_groups', []) | length > 0
        - inventory_hostname == groups['controller_groups'][0]

    - name: Stage hub artifact
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.operations
        tasks_from: stage_artifact.yml
      vars:
        component_name: "{{ automationhub_component_name }}"
      when:
        - groups.get('hub_groups', []) | length > 0
        - inventory_hostname == groups['hub_groups'][0]

    - name: Stage gateway artifact
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.operations
        tasks_from: stage_artifact.yml
      vars:
        component_name: "{{ automationgateway_component_name }}"
      when:
        - groups.get('gateway_groups', []) | length > 0
        - inventory_hostname == groups['gateway_groups'][0]

    - name: Stage EDA artifact
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.operations
        tasks_from: stage_artifact.yml
      vars:
        component_name: "{{ automationeda_component_name }}"
      when:
        - groups.get('eda_groups', []) | length > 0
        - inventory_hostname == groups['eda_groups'][0]

    # --- Import databases ---
    - name: Import controller
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationcontroller
        tasks_from: import.yml
      when:
        - groups.get('controller_groups', []) | length > 0
        - inventory_hostname == groups['controller_groups'][0]

    - name: Import hub
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationhub
        tasks_from: import.yml
      when:
        - groups.get('hub_groups', []) | length > 0
        - inventory_hostname == groups['hub_groups'][0]

    - name: Import gateway
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationgateway
        tasks_from: import.yml
      when:
        - groups.get('gateway_groups', []) | length > 0
        - inventory_hostname == groups['gateway_groups'][0]

    - name: Import EDA
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationeda
        tasks_from: import.yml
      when:
        - groups.get('eda_groups', []) | length > 0
        - inventory_hostname == groups['eda_groups'][0]

    # --- Restore hub content ---
    - name: Restore hub content to volume
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationhub
        tasks_from: import_hub_content.yml
      when:
        - groups.get('hub_groups', []) | length > 0
        - inventory_hostname == groups['hub_groups'][0]

    # --- Reconcile gateway (before installer re-run) ---
    - name: Reconcile gateway
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationgateway
        tasks_from: reconcile.yml
      when:
        - groups.get('gateway_groups', []) | length > 0
        - inventory_hostname == groups['gateway_groups'][0]

    # --- Start services ---
    - name: Start EDA
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationeda
        tasks_from: start_service.yml
      when:
        - groups.get('eda_groups', []) | length > 0
        - inventory_hostname in groups.get('eda_groups', [])

    - name: Start hub
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationhub
        tasks_from: start_service.yml
      when:
        - groups.get('hub_groups', []) | length > 0
        - inventory_hostname in groups.get('hub_groups', [])

    - name: Start controller
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationcontroller
        tasks_from: start_service.yml
      when:
        - groups.get('controller_groups', []) | length > 0
        - inventory_hostname in groups.get('controller_groups', [])

    - name: Start gateway
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationgateway
        tasks_from: start_service.yml
      when:
        - groups.get('gateway_groups', []) | length > 0
        - inventory_hostname in groups.get('gateway_groups', [])

    - name: Start monitoring
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.pcp
        tasks_from: start_service.yml
      when: inventory_hostname in (groups.get('controller_groups', [])
              + groups.get('eda_groups', [])
              + groups.get('gateway_groups', [])
              + groups.get('hub_groups', []))

- name: Consume artifact (OCP)
  when: aap_platform == 'operator'
  block:
    # --- Pre-import checks ---
    - name: Validate target version matches artifact
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.preflight
        tasks_from: check_version_match.yml

    # --- Determine which components to import ---
    - name: Discover target components
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: discover_components.yml

    - name: Determine importable components
      ansible.builtin.set_fact:
        _artifact_import_components: >-
          {{ artifact_manifest.components | map(attribute='name') | list
             | intersect(
               (['controller'] if _controller_cr_name is defined else [])
               + (['hub'] if _hub_cr_name is defined else [])
               + (['eda'] if _eda_cr_name is defined else [])
               + (['gateway'])
             ) }}

    - name: Check if hub content data is available in artifact
      ansible.builtin.set_fact:
        artifact_hub_has_content_data: >-
          {{ artifact_manifest.components
             | selectattr('name', 'equalto', 'hub')
             | map(attribute='has_content_data')
             | first | default(false) | bool }}
      # first catches missing hub component, default catches older artifacts without has_content_data

    - name: Warn about components in artifact but not on target
      ansible.builtin.debug:
        msg: >-
          Component '{{ item }}' is in the artifact but not deployed
          on the target - skipping.
      loop: >-
        {{ artifact_manifest.components | map(attribute='name') | list
           | difference(_artifact_import_components) }}

    - name: Warn about components on target but not in artifact
      ansible.builtin.debug:
        msg: >-
          Component '{{ item }}' is deployed on the target but not
          present in the artifact - skipping.
      loop: >-
        {{ ((['controller'] if _controller_cr_name is defined else [])
            + (['hub'] if _hub_cr_name is defined else [])
            + (['eda'] if _eda_cr_name is defined else [])
            + (['gateway']))
           | difference(_artifact_import_components) }}

    # --- Stage artifact while AAP is still running ---
    - name: Create temporary migration resources
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: create_temp_resources.yml

    - name: Transfer artifact to temporary pod
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: transfer_artifact.yml
      vars:
        artifact_path: "{{ _preflight_resolved_artifact | default(artifact_file) }}"

    # --- Idle AAP for import ---
    - name: Set AAP to idle
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: idle_aap.yml
      vars:
        ocp_idle_aap: true

    - name: Scale operators to zero
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: scale_operators.yml
      vars:
        ocp_operator_replicas: 0

    # --- Import databases ---
    - name: Import controller
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationcontroller
        tasks_from: import.yml
      when: "'controller' in _artifact_import_components"

    - name: Import hub
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationhub
        tasks_from: import.yml
      when: "'hub' in _artifact_import_components"

    - name: Delete hub file-storage PVC
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: delete_hub_file_storage_pvc.yml
      when: "'hub' in _artifact_import_components"

    - name: Import gateway
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationgateway
        tasks_from: import.yml
      when: "'gateway' in _artifact_import_components"

    - name: Import EDA
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationeda
        tasks_from: import.yml
      when: "'eda' in _artifact_import_components"

    # --- Delete controller migration jobs before scaling operators ---
    - name: Delete controller migration jobs
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: delete_controller_migration_jobs.yml
      when: "'controller' in _artifact_import_components"

    # --- Restore hub content files ---
    - name: Restore hub content to file-storage PVC
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationhub
        tasks_from: import_hub_content.yml
      when:
        - "'hub' in _artifact_import_components"
        - artifact_hub_has_content_data | default(false)

    # --- Resume AAP ---
    - name: Scale operators back up
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: scale_operators.yml
      vars:
        ocp_operator_replicas: 1

    - name: Resume AAP
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: idle_aap.yml
      vars:
        ocp_idle_aap: false

    # --- Gateway-first reconcile (unblocks operator) ---
    - name: Record current gateway pod name for restart
      ansible.builtin.set_fact:
        _artifact_gateway_pod_name: "{{ _ocp_utils_gateway_pods.resources[0].metadata.name }}"

    - name: Load secret mapping from ocp_utils
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: set_secret_mapping.yml

    - name: Re-apply gateway encryption secret
      kubernetes.core.k8s:
        kind: Secret
        name: "{{ item.secret_name }}"
        namespace: "{{ ocp_namespace | default('aap') }}"
        state: patched
        definition:
          data: "{{ {item.field: artifact_secrets[item.artifact_key]} }}"
      loop: "{{ _ocp_utils_secret_mapping | selectattr('component', 'equalto', 'gateway') | list }}"
      loop_control:
        label: "{{ item.secret_name }}"
      no_log: "{{ not (disable_no_log | default(false) | bool) }}"
      when: artifact_secrets[item.artifact_key] is defined

    - name: Restart gateway pod to pick up restored encryption secret
      kubernetes.core.k8s:
        kind: Pod
        namespace: "{{ ocp_namespace | default('aap') }}"
        name: "{{ _artifact_gateway_pod_name }}"
        state: absent

    - name: Wait for new gateway pod
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: discover_pod.yml
      vars:
        _discover_label: "gateway"
        _discover_selectors:
          - "app.kubernetes.io/component=aap-gateway"
        _discover_pod_fact: "_ocp_utils_gateway_pod_name"
        _discover_container_fact: "_ocp_utils_gateway_container_name"
        _discover_container_name: "api"

    - name: Detect Django version and set manage shell args
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.operations
        tasks_from: detect_django_version_ocp.yml
      vars:
        _component_pod_name: "{{ _ocp_utils_gateway_pod_name }}"
        _component_container_name: "{{ _ocp_utils_gateway_container_name }}"
        _operations_detect_manage_cmd: "aap-gateway-manage"
        operations_ocp_namespace: "{{ ocp_namespace | default('aap') }}"

    - name: Reconcile gateway
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationgateway
        tasks_from: reconcile.yml

    # --- Wait for remaining components ---
    - name: Wait for and discover component pods for reconcile
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: discover_components.yml
      vars:
        _wait_for_running: true

    - name: Re-apply remaining encryption secrets
      kubernetes.core.k8s:
        kind: Secret
        name: "{{ item.secret_name }}"
        namespace: "{{ ocp_namespace | default('aap') }}"
        state: patched
        definition:
          data: "{{ {item.field: artifact_secrets[item.artifact_key]} }}"
      loop: "{{ _ocp_utils_secret_mapping | rejectattr('component', 'equalto', 'gateway') | list }}"
      loop_control:
        label: "{{ item.secret_name }}"
      no_log: "{{ not (disable_no_log | default(false) | bool) }}"
      when: artifact_secrets[item.artifact_key] is defined

    # --- Reconcile remaining components ---
    - name: Reconcile controller
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationcontroller
        tasks_from: reconcile.yml
      when: "'controller' in _artifact_import_components"

    - name: Reconcile hub
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationhub
        tasks_from: reconcile.yml
      when: "'hub' in _artifact_import_components"

    - name: Reconcile EDA
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationeda
        tasks_from: reconcile.yml
      when: "'eda' in _artifact_import_components"

    - name: Wait for AAP CR to reach ready state
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: wait_aap_ready.yml

    - name: Mark import as succeeded
      ansible.builtin.set_fact:
        _artifact_import_succeeded: true

  rescue:
    - name: Scale operators back up (recovery)
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: scale_operators.yml
      vars:
        ocp_operator_replicas: 1

    - name: Resume AAP (recovery)
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: idle_aap.yml
      vars:
        ocp_idle_aap: false

    - name: Report import failure
      ansible.builtin.fail:
        msg: >-
          Import failed. Operators and AAP have been restored.
          Failed task: {{ ansible_failed_task.name | default('unknown') }}.
          Error: {{ ansible_failed_result.msg | default(ansible_failed_result | to_nice_json) }}

  always:
    - name: Remove temporary migration resources
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.ocp_utils
        tasks_from: cleanup_temp_resources.yml
      when: (_artifact_import_succeeded | default(false) | bool) or not (keep_temp_on_failure | default(true) | bool)
