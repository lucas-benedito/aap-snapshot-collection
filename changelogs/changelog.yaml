ancestor: null
releases:
  0.0.1:
    changes:
      breaking_changes:
      - aap_component_info - The ``gather`` parameter now enforces ``choices`` validation.
        Unrecognized values that were previously accepted silently will now produce
        a validation error.
      major_changes:
      - Add Python modules ``aap_component_info`` for RPM component discovery and
        ``validate_migration_artifact`` for artifact validation, and ``parse_aap_version``
        filter plugin for version string parsing.
      - Add full export workflow for RPM deployments with SDP v1.0 artifact format,
        component export roles for controller, hub (with Pulp content), gateway, and
        EDA, and standalone artifact verification playbook.
      - Add import workflow for OCP targets with database restore, secret synchronization,
        operator lifecycle management, temporary migration resources, and post-import
        reconciliation for all four AAP components.
    fragments:
    - gather-choices-enforcement.yaml
    - initial-export-workflow.yaml
    - initial-import-workflow.yaml
    release_date: '2026-06-30'
  1.0.0:
    changes:
      breaking_changes:
      - Role namespace and instance name variables are now decoupled from ``ocp_utils``
        defaults. Use ``-e ocp_namespace=<ns>`` and ``-e aap_instance_name=<name>``
        instead of ``-e ocp_utils_ocp_namespace=<ns>`` and ``-e ocp_utils_aap_instance_name=<name>``.
        The ``ocp_utils_*`` variables still work for the ``ocp_utils`` role itself
        but no longer propagate to other roles.
      bugfixes:
      - Idle wait now checks Deployment and StatefulSet replica counts instead of
        pod label selectors that matched no pods. The previous ``app.kubernetes.io/managed-by``
        value-match selector did not match actual pod labels, causing the wait to
        pass immediately and database restores to run against live pods with active
        connections.
      - Idle wait scoped to AAP-managed resources using the ``app.kubernetes.io/part-of``
        label selector, preventing false matches against non-AAP workloads in shared
        namespaces.
      - User-provided extra vars ``ocp_namespace`` and ``aap_instance_name`` are now
        respected by all roles. Previously, roles hardcoded the namespace to ``aap``
        or chained through ``ocp_utils`` defaults that only resolved when ``ocp_utils``
        was explicitly included first, silently ignoring ``-e ocp_namespace=custom-ns``.
    fragments:
    - decouple-role-variables.yaml
    - fix-idle-wait-replicas.yaml
    modules:
    - description: Discover AAP component information from RPM installations
      name: aap_component_info
      namespace: ''
    - description: Validate an AAP migration artifact
      name: validate_migration_artifact
      namespace: ''
    plugins:
      filter:
      - description: Parse an AAP version string into structured components
        name: parse_aap_version
        namespace: null
    release_date: '2026-07-01'
  1.0.1:
    release_date: '2026-07-01'
  1.0.2:
    changes:
      breaking_changes:
      - The ``artifact_file`` variable is now required for import and verify playbooks.
        It no longer defaults to ``aap-snapshot-latest.tar``.
      bugfixes:
      - Cascade idle_deployment false directly to child CRs when un-idling to work
        around AAP-77947 where the gateway operator fails to propagate it.
      - Reconcile gateway before waiting for other components to clear stale service_nodes
        that block the gateway operator reconciliation loop.
      - Remove aap-snapshot-latest.tar symlink from export packaging - k8s_cp copies
        the symlink instead of the file content, breaking imports.
      - Remove statefulset idle wait that caused timeout failures during import -
        the operator does not scale statefulsets during idle.
      - Resolve symlinks and relative paths to absolute real paths before artifact
        transfer to prevent dangling links inside the temporary pod.
      - Set database.idle_disabled on the AAP CR before idling to keep postgres running
        during database import.
      minor_changes:
      - Skip artifact transfer to temporary pod when the file already exists with
        a matching checksum.
    fragments:
    - drop-latest-symlink.yaml
    - skip-artifact-transfer-if-cached.yaml
    release_date: '2026-07-01'
  1.0.3:
    changes:
      bugfixes:
      - Fix hub reconcile failing with ``automationgateway_admin_user is undefined``
        by defining the admin username in the hub role's own defaults instead of depending
        on the gateway role's defaults (https://github.com/ansible-collections/aap-snapshot-collection/issues/46).
      - Fix meta/execution-environment.yml python and system dependency paths for
        ansible-builder.
      - Fix orphan instance detection to include nodes with null health check or null
        capacity after database restore.
      - Fix post-export artifact validation failing when ``artifact_dest_dir`` differs
        from the default. The validate play now correctly resolves the extracted artifact
        path relative to ``artifact_dest_dir`` instead of using ``artifact_build_dir``,
        which is deleted by the package handler before validation runs (https://github.com/ansible-collections/aap-snapshot-collection/issues/23).
      - Remove variable interpolation from task names to prevent exposing internal
        data in logs and CI output.
      - Replace non-existent pulpcore-manager repair-artifacts command with Pulp REST
        API call for hub content repair.
      - Reset gateway migrate_service_data flag during vestigial cleanup so the operator
        re-runs service registration after database restore.
      minor_changes:
      - Add debugging guide covering OCP import failure recovery, leftover temporary
        resource cleanup, idle state recovery, and common export issues (https://github.com/ansible-collections/aap-snapshot-collection/pull/26).
      - Merge wait_for_pods and discover_components into a single pass to reduce redundant
        pod lookups during import.
      - Move scale and un-idle recovery from always to rescue block so they only run
        on import failure.
      - Remove duplicate gateway pod wait from import playbook.
      - Standardize gateway pod label selectors to hardcoded values matching operator
        deployment_type defaults.
    fragments:
    - docs-debugging-guide.yml
    - fix-ee-paths.yml
    - fix-hub-reconcile-admin-user.yml
    - fix-hub-repair-use-api.yml
    - fix-orphan-detection-filter.yml
    - fix-remove-vars-from-task-names.yml
    - fix-reset-migrate-service-data-flag.yml
    - fix-validate-artifact-dest-dir.yml
    - refactor-hardcode-label-selectors.yml
    - refactor-merge-wait-discover.yml
    - refactor-playbook-dedup.yml
    release_date: '2026-07-02'
  1.0.4:
    changes:
      bugfixes:
      - Added top-level ``requirements.txt`` to the collection so that ``ansible-builder``
        can resolve Python dependencies (``pyyaml``, ``kubernetes``) when constructing
        execution environments. Also added missing ``kubernetes`` dependency to ``meta/ee-requirements.txt``
        (https://github.com/ansible-collections/aap-snapshot-collection/issues/48).
      - automationhub - Fixed incorrect gateway service name in Pulp repair URL for
        OCP deployments (https://github.com/ansible-collections/aap-snapshot-collection/pull/49).
      - import - Include the original error details in the import failure report instead
        of a generic message (https://github.com/ansible-collections/aap-snapshot-collection/pull/XX).
    fragments:
    - add-requirements-txt.yaml
    - fix-hub-reconcile-gateway-url.yml
    - fix-import-failure-report.yml
    release_date: '2026-07-07'
