---
breaking_changes:
  - >-
    Role namespace and instance name variables are now decoupled from
    ``ocp_utils`` defaults. Use ``-e ocp_namespace=<ns>`` and
    ``-e aap_instance_name=<name>`` instead of
    ``-e ocp_utils_ocp_namespace=<ns>`` and
    ``-e ocp_utils_aap_instance_name=<name>``. The ``ocp_utils_*``
    variables still work for the ``ocp_utils`` role itself but no
    longer propagate to other roles.
bugfixes:
  - >-
    User-provided extra vars ``ocp_namespace`` and ``aap_instance_name``
    are now respected by all roles. Previously, roles hardcoded the
    namespace to ``aap`` or chained through ``ocp_utils`` defaults that
    only resolved when ``ocp_utils`` was explicitly included first,
    silently ignoring ``-e ocp_namespace=custom-ns``.
