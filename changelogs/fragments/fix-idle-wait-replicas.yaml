---
bugfixes:
  - >-
    Idle wait now checks Deployment and StatefulSet replica counts
    instead of pod label selectors that matched no pods. The previous
    ``app.kubernetes.io/managed-by`` value-match selector did not match
    actual pod labels, causing the wait to pass immediately and database
    restores to run against live pods with active connections.
  - >-
    Idle wait scoped to AAP-managed resources using the
    ``app.kubernetes.io/part-of`` label selector, preventing false
    matches against non-AAP workloads in shared namespaces.
