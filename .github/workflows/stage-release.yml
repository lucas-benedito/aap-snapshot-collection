---
# Stage a collection release:
# 1. Stamps version into galaxy.yml
# 2. Generates changelog via antsibull-changelog
# 3. Commits and pushes to a release branch
# 4. Opens a PR against the target branch for review
# When the PR is merged, create-release.yml creates a draft GitHub Release.
# When the draft release is published, Zuul builds and publishes the collection.
name: Stage Collection Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Collection version to release (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  stage-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Validate version format
        run: |
          if ! echo "${VERSION}" | grep -qP '^\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?$'; then
            echo "::error::Invalid version format: ${VERSION}"
            exit 1
          fi

      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Check for existing release branch
        run: |
          if git ls-remote --heads origin "release/${VERSION}" | grep -q .; then
            echo "::error::Branch release/${VERSION} already exists. Delete it first or use a different version."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install 'ansible-core>=2.16,<2.18' 'antsibull-changelog>=0.29,<1.0'

      - name: Set collection version
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" galaxy.yml

      - name: Check for changelog fragments
        run: |
          if [ -z "$(ls changelogs/fragments/*.yml changelogs/fragments/*.yaml 2>/dev/null)" ]; then
            echo "::warning::No changelog fragments found -- release changelog will be empty"
          fi

      - name: Generate changelog
        run: antsibull-changelog release --version "${VERSION}"

      - name: Create release branch and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/${VERSION}"
          git add galaxy.yml CHANGELOG.rst changelogs/
          if git diff --cached --quiet; then
            echo "::error::No changes to commit -- version may already be set"
            exit 1
          fi
          git commit -m "Release ${VERSION}"
          git push origin "release/${VERSION}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${{ github.ref_name }}" \
            --head "release/${VERSION}" \
            --title "Release ${VERSION}" \
            --body "## Release ${VERSION}

          Staged by the **Stage Collection Release** workflow.

          ### Changes
          - Version bumped to \`${VERSION}\` in \`galaxy.yml\`
          - Changelog generated from fragments via \`antsibull-changelog\`

          ### After merge
          A draft GitHub Release will be created automatically.
          Review and **publish** the draft to trigger Zuul collection build."
