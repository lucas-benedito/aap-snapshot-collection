name: Bug Report
description: Report a bug in the AAP Snapshot Collection
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief description of the bug.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Source/Target Platform
      description: Which platform(s) are involved?
      multiple: true
      options:
        - RPM (traditional)
        - Containerized
        - Operator (OCP)
    validations:
      required: true
  - type: input
    id: aap-version
    attributes:
      label: AAP Version
      description: The AAP version you are migrating from/to.
      placeholder: "2.6"
    validations:
      required: true
  - type: input
    id: collection-version
    attributes:
      label: Collection Version
      description: Output of `ansible-galaxy collection list ansible.aap_snapshot`.
    validations:
      required: false
  - type: input
    id: ansible-version
    attributes:
      label: ansible-core version
      description: Output of `ansible --version`.
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages and logs if applicable.
    validations:
      required: true
