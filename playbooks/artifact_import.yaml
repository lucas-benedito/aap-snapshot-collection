---
- name: Preflight
  hosts: localhost:automationcontroller:automationedacontroller:automationeda:automationgateway:automationhub
  gather_facts: false
  any_errors_fatal: true
  max_fail_percentage: 0
  environment: "{{ ocp_utils_ocp_environment | default({}) }}"
  vars:
    _snapshot_operation: import
  tasks:
    - name: Set Common Groups
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.common
        tasks_from: set_groups.yml

    - name: Running Preflight
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.preflight
        tasks_from: main.yml

- name: Validate and extract artifact
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true
  max_fail_percentage: 0
  vars:
    _artifact_path: "{{ artifact_file | default('aap-snapshot-latest.tar') }}"
    artifact_filename: "{{ _artifact_path | basename }}"
    artifact_dir: "{{ _artifact_path | dirname or lookup('env', 'PWD') }}"
  tasks:
    - name: Extract and validate artifact
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.artifact
        tasks_from: extract.yml

- name: Import (OCP)
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true
  max_fail_percentage: 0
  environment: "{{ ocp_utils_ocp_environment | default({}) }}"
  tasks:
    - name: Deploy, import, and reconcile on OCP
      when: aap_platform == 'operator'
      block:
        # --- Pre-import checks ---
        - name: Validate target version matches artifact
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.preflight
            tasks_from: check_version_match.yml

        # --- Stage artifact while AAP is still running ---
        - name: Create temporary migration resources
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: create_temp_resources.yml

        - name: Transfer artifact to temporary pod
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: transfer_artifact.yml
          vars:
            artifact_path: "{{ artifact_file }}"

        # --- Idle AAP for import ---
        - name: Set AAP to idle
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: idle_aap.yml
          vars:
            ocp_idle_aap: true

        - name: Scale operators to zero
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: scale_operators.yml
          vars:
            ocp_operator_replicas: 0

        # --- Import databases ---
        - name: Import controller
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.automationcontroller
            tasks_from: import.yml
          when: artifact_manifest.components | selectattr('name', 'equalto', 'controller') | list | length > 0

        - name: Import hub
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.automationhub
            tasks_from: import.yml
          when: artifact_manifest.components | selectattr('name', 'equalto', 'hub') | list | length > 0

        - name: Import gateway
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.automationgateway
            tasks_from: import.yml
          when: artifact_manifest.components | selectattr('name', 'equalto', 'gateway') | list | length > 0

        - name: Import EDA
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.automationeda
            tasks_from: import.yml
          when: artifact_manifest.components | selectattr('name', 'equalto', 'eda') | list | length > 0

        # --- Resume AAP ---
        - name: Scale operators back up
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: scale_operators.yml
          vars:
            ocp_operator_replicas: 1

        - name: Resume AAP
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: idle_aap.yml
          vars:
            ocp_idle_aap: false

        - name: Wait for component pods to be reachable
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: wait_for_pods.yml

        - name: Discover component pods for reconcile
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: discover_components.yml

        - name: Load secret mapping from ocp_utils
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: set_secret_mapping.yml
          when: aap_platform == 'operator'

        - name: Re-apply encryption secrets overwritten by operator
          kubernetes.core.k8s:
            kind: Secret
            name: "{{ item.secret_name }}"
            namespace: "{{ ocp_utils_ocp_namespace }}"
            state: patched
            definition:
              data: "{{ {item.field: artifact_secrets[item.artifact_key]} }}"
          loop: "{{ _ocp_utils_secret_mapping }}"
          loop_control:
            label: "{{ item.secret_name }}"
          no_log: "{{ not (disable_no_log | default(false) | bool) }}"
          when:
            - aap_platform == 'operator'
            - artifact_secrets[item.artifact_key] is defined

        - name: Restart gateway pod to pick up restored encryption secret
          kubernetes.core.k8s:
            kind: Pod
            namespace: "{{ ocp_utils_ocp_namespace }}"
            name: "{{ _ocp_utils_gateway_pod_name }}"
            state: absent
          when: aap_platform == 'operator'

        - name: Wait for new gateway pod
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: discover_pod.yml
          vars:
            _discover_label: "gateway"
            _discover_selectors:
              - "app.kubernetes.io/component=aap-gateway"
            _discover_pod_fact: "_ocp_utils_gateway_pod_name"
            _discover_container_fact: "_ocp_utils_gateway_container_name"
            _discover_container_name: "api"
          when: aap_platform == 'operator'

        - name: Detect Django version for manage shell compatibility
          kubernetes.core.k8s_exec:
            namespace: "{{ ocp_utils_ocp_namespace }}"
            pod: "{{ _ocp_utils_gateway_pod_name }}"
            container: "{{ _ocp_utils_gateway_container_name }}"
            command: >-
              aap-gateway-manage shell -c "import django; print(django.VERSION[0])"
          register: _django_version_check
          changed_when: false
          failed_when: false

        - name: Set manage shell args for Django 5.x compatibility
          ansible.builtin.set_fact:
            _operations_manage_shell_args: "{{ '--no-imports' if (_django_version_check.stdout_lines | default(['4']) | last | trim | int) >= 5 else '' }}"
          delegate_facts: true
          delegate_to: localhost

        # --- Reconcile ---
        - name: Reconcile gateway
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.automationgateway
            tasks_from: reconcile.yml

        - name: Reconcile controller
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.automationcontroller
            tasks_from: reconcile.yml

        - name: Reconcile hub
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.automationhub
            tasks_from: reconcile.yml

        - name: Reconcile EDA
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.automationeda
            tasks_from: reconcile.yml

        - name: Wait for AAP CR to reach ready state
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: wait_aap_ready.yml

        - name: Mark import as succeeded
          ansible.builtin.set_fact:
            _import_succeeded: true

      always:
        - name: Scale operators back up (recovery)
          block:
            - name: Scale operators to 1
              ansible.builtin.include_role:
                name: ansible.aap_snapshot.ocp_utils
                tasks_from: scale_operators.yml
              vars:
                ocp_operator_replicas: 1
          rescue:
            - name: Scale operators recovery failed
              ansible.builtin.debug:
                msg: "Failed to scale operators back up. Manual intervention may be required."

        - name: Resume AAP (recovery)
          block:
            - name: Un-idle AAP
              ansible.builtin.include_role:
                name: ansible.aap_snapshot.ocp_utils
                tasks_from: idle_aap.yml
              vars:
                ocp_idle_aap: false
          rescue:
            - name: Resume AAP recovery failed
              ansible.builtin.debug:
                msg: "Failed to un-idle AAP. Manual intervention may be required."

        - name: Remove temporary migration resources
          ansible.builtin.include_role:
            name: ansible.aap_snapshot.ocp_utils
            tasks_from: cleanup_temp_resources.yml
          when: (_import_succeeded | default(false) | bool) or not (keep_temp_on_failure | default(true) | bool)

- name: Stop containerized services
  ansible.builtin.import_playbook: common/stop_services.yaml
  when: aap_platform == 'containerized'

- name: Import databases (containerized)
  hosts: controller_groups:eda_groups:gateway_groups:hub_groups
  gather_facts: false
  any_errors_fatal: true
  max_fail_percentage: 0
  tasks:
    - name: Import controller
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationcontroller
        tasks_from: import.yml
      when:
        - aap_platform == 'containerized'
        - groups.get('controller_groups', []) | length > 0
        - inventory_hostname == groups['controller_groups'][0]

    - name: Import hub
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationhub
        tasks_from: import.yml
      when:
        - aap_platform == 'containerized'
        - groups.get('hub_groups', []) | length > 0
        - inventory_hostname == groups['hub_groups'][0]

    - name: Import gateway
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationgateway
        tasks_from: import.yml
      when:
        - aap_platform == 'containerized'
        - groups.get('gateway_groups', []) | length > 0
        - inventory_hostname == groups['gateway_groups'][0]

    - name: Import EDA
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationeda
        tasks_from: import.yml
      when:
        - aap_platform == 'containerized'
        - groups.get('eda_groups', []) | length > 0
        - inventory_hostname == groups['eda_groups'][0]

- name: Start containerized services
  ansible.builtin.import_playbook: containerized/start_aap.yaml
  when: aap_platform == 'containerized'

- name: Reconcile (containerized)
  hosts: controller_groups:eda_groups:gateway_groups:hub_groups
  gather_facts: false
  any_errors_fatal: true
  max_fail_percentage: 0
  tasks:
    - name: Reconcile gateway
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationgateway
        tasks_from: reconcile.yml
      when:
        - aap_platform == 'containerized'
        - groups.get('gateway_groups', []) | length > 0
        - inventory_hostname == groups['gateway_groups'][0]

    - name: Reconcile controller
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationcontroller
        tasks_from: reconcile.yml
      when:
        - aap_platform == 'containerized'
        - groups.get('controller_groups', []) | length > 0
        - inventory_hostname == groups['controller_groups'][0]

    - name: Reconcile hub
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationhub
        tasks_from: reconcile.yml
      when:
        - aap_platform == 'containerized'
        - groups.get('hub_groups', []) | length > 0
        - inventory_hostname == groups['hub_groups'][0]

    - name: Reconcile EDA
      ansible.builtin.include_role:
        name: ansible.aap_snapshot.automationeda
        tasks_from: reconcile.yml
      when:
        - aap_platform == 'containerized'
        - groups.get('eda_groups', []) | length > 0
        - inventory_hostname == groups['eda_groups'][0]

- name: Post-import validation and report
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true
  max_fail_percentage: 0
  tasks:
    - name: Migration summary
      ansible.builtin.debug:
        msg: |-
          === Migration Complete ===
          Source platform: {{ artifact_manifest.source_topology }}
          Target platform: {{ aap_platform }}
          AAP version: {{ artifact_manifest.aap_version }}.{{ artifact_manifest.aap_version_patch | default('0') }}
          Components migrated:
          {% for comp in artifact_manifest.components %}
            - {{ comp.name }} (v{{ comp.version }}, database: {{ comp.database_name }})
          {% endfor %}
      when: artifact_manifest is defined

    - name: Post-import advisory
      ansible.builtin.debug:
        msg: |-
          === Next Steps ===
          - Verify admin credentials and login to the gateway UI
          - Check instance group assignments - restored resources may need reassignment
          - EDA: update automation controller URL in credentials if hostnames changed
          - Execution nodes: register equivalent nodes in target controller UI
          {% set _hub = artifact_manifest.components | selectattr('name', 'equalto', 'hub') | list %}
          {% if _hub and not (_hub[0].has_content_data | default(false)) %}
          - Hub content was not migrated - run content sync manually
          {% endif %}
          - Review custom TLS certificates and reapply if needed
      when: artifact_manifest is defined

    - name: Advise re-running the containerized installer
      ansible.builtin.debug:
        msg: |-
          === Containerized Import Complete ===
          Database restore and basic reconciliation finished successfully.

          To fully reconcile the deployment, re-run the containerized installer
          against the target inventory. The installer will:
            - Regenerate service configuration files
            - Update TLS certificates and trust bundles
            - Reconcile systemd unit files for all components
            - Apply any configuration drift from the source environment

          Next steps:
            1. Navigate to the containerized installer directory
            2. Run the installer using the same inventory and method
               used for the original deployment
      when: aap_platform == 'containerized'
